paw_datasets:
  Cs: Cs.9.PBE
  Pb: Pb.14.PBE
  I: I.7.PBE
# Cs/Pb/I usan datasets PAW PBE en ~/.gpaw/gpaw-setups-24.11.0/.

cutoff:
  pw_ecut: 450           # eV — equivalente a ENCUT en VASP
  convergence_range: [300, 350, 400, 450, 500, 550]

kpoints:
  bulk_relax: [6, 6, 6]
  supercell_2x2x2: [3, 3, 3]
  hse06: [2, 2, 2]
  bands_npoints: 40      # puntos por segmento en path

relax:
  xc: PBEsol
  mode: PW
  ecut: 450
  kpts: [6, 6, 6]
  convergence:
    energy: 1.0e-6       # eV
    forces: 0.01         # eV/Å
  mixer:
    type: Mixer
    beta: 0.05           # mezcla conservadora para haluros blandos
  maxiter: 333
  symmetry: on

scf:
  xc: PBEsol
  mode: PW
  ecut: 450
  kpts: [6, 6, 6]
  convergence:
    energy: 1.0e-8
  occupations:
    name: fermi-dirac
    width: 0.05

bands:
  kpts_path: "XRMGR"     # path alta simetría cúbico
  npoints: 40
  convergence:
    bands: -10            # incluir 10 bandas desocupadas

dos:
  kpts: [12, 12, 12]     # malla densa para DOS
  npts: 2000
  width: 0.05            # smearing eV para DOS

soc:
  # En GPAW el SOC se aplica perturbativamente post-SCF con spinorbit_eigenvalues()
  # o con modo no-colineal nativo
  mode: perturbative     # 'perturbative' | 'noncollinear'
  theta: 0               # ángulo polar cuantización
  phi: 0                 # ángulo azimutal

hse06:
  xc: HSE06
  omega: 0.11
  mode: PW
  ecut: 450
  kpts: [4, 4, 4]        # 4x4x4 incluye R=(0.5,0.5,0.5) para gap real CsPbI3
  # "auto" calcula nbands = n_occ + int(n_occ * 0.5) desde scf.gpw (50% extra vacías)
  # int(n_occ*1.3) daba solo 6 vacías para n_occ=22; +50% da 11 vacías — necesario
  # para que el operador de Fock converja en la banda de conducción.
  # Sustituir por entero para forzar un valor fijo.
  nbands: auto
  eigensolver_niter: 3   # pasos Davidson internos por ciclo SCF (default=1 para híbridos)
  convergence:
    energy: 1.0e-6
    eigenstates: 1.0e-4   # relajado: 4e-8 default inalcanzable bajo Fock oscilante
    density: 1.0e-4
  occupations:
    name: fermi-dirac
    # Semiconductor/aislado: width mínimo evita ocupaciones artificiales en el gap
    # Para sistema metálico o con degeneración HOMO-LUMO, subir a 0.05
    width: 0.01
  mixer:
    # MSR1 (MixerSum, Pulay DIIS) con beta bajo: las actualizaciones lentas de densidad
    # previenen la divergencia del potencial de intercambio exacto entre ciclos SCF
    beta: 0.01
    nmaxold: 8            # historia DIIS larga (8 vs 5 default) amortigua oscilaciones Fock

  # --- Sistema aislado: molécula, clúster o nanocristal ---
  # Si el sistema no es periódico, garantizar al menos 8 Å de vacío:
  #   atoms.center(vacuum=8.0)
  # Para sistemas polares o cargados, activar corrección dipolar (opcional):
  #   from gpaw import PoissonSolver
  #   poissonsolver = PoissonSolver(dipolelayer='z')   # 'xy' | 'z' según orientación

scan:
  xc: SCAN
  mode: PW
  ecut: 450
  kpts: [6, 6, 6]       # misma malla que SCF — R-point incluido
  convergence:
    energy: 1.0e-6
    eigenstates: 1.0e-8
    density: 1.0e-6
  occupations:
    name: fermi-dirac
    width: 0.05

r2scan:
  xc: MGGA_X_R2SCAN+MGGA_C_R2SCAN   # alias GPAW no existe; usar string LibXC directo
  mode: PW
  ecut: 450
  kpts: [6, 6, 6]
  convergence:
    energy: 1.0e-6
    eigenstates: 1.0e-8
    density: 1.0e-4         # libxc --fhc activo hace la densidad muy lenta; 1e-4 suficiente para gap
  occupations:
    name: fermi-dirac
    width: 0.05

dispersion:
  method: D3             # DFT-D3(BJ) vía GPAW + dftd3 library

phonons:
  method: phonopy          # "phonopy" | "ase"
  delta: 0.02              # Å — small displacement for anharmonic perovskites
  delta_validation: 0.03   # Å — cross-check displacement
  supercell: [2, 2, 2]
  kpath_npoints: 60
  dos_kpts: [20, 20, 20]
  scf_convergence:
    energy: 1.0e-8
    density: 1.0e-5        # tighter density for accurate forces
    eigenstates: 1.0e-8    # 1e-8 sufficient for Δ=0.02 Å (Togo et al.); 1e-10 was overkill
  asr: crystal             # Phonopy ASR: "translational" | "crystal"

pes:
  soft_mode_threshold_eV_Ang2: 0.05   # quasi-zero/negative Hessian modes activate scan
  scan_amplitude_Ang: 0.5             # range ±0.5 Å along eigenvector
  scan_n_steps: 20                    # points in [-A, +A]
  double_well_barrier_meV: 10         # minimum barrier to classify as double well
  neb_n_images: 7                     # NEB images (excluding endpoints)
  neb_fmax_eV_Ang: 0.10              # NEB convergence criterion
  neb_spring_constant: 0.10           # spring constant in eV/Å²
  run_neb_if_double_well: true        # auto-launch CI-NEB if double well detected

optical:
  omega_max_eV: 6.0
  d_omega_eV: 0.025
  eta_eV: 0.1
  onset_threshold_cm1: 1.0e4
  scissor_eV: null               # null = auto-detect from HSE06−PBE; float = fixed shift
  alpha_sample_eV: [1.5, 2.0, 2.5, 3.0]

sq_limit:
  thickness_nm: 500.0            # nominal film thickness for primary calculation
  T_K: 300.0                     # device temperature
  thickness_scan_nm: [100, 200, 300, 400, 500, 750, 1000, 2000]  # sweep for optimal d

oghma_device:
  # OghmaNano drift-diffusion + optics solver (not ML).
  # sim/sim.json is auto-generated from the DFT outputs + GitHub perovskite template.
  # sim/materials/CsPbI3/nk.csv is written from DFT RPA n(ω)/k(ω).
  executable: null               # null = auto-detect: OGHMA_EXECUTABLE env → oghma_core → oghma
  execute: true                  # run oghma_core automatically (wine64 required)
  timeout_s: 600
  use_xvfb: true                 # required by OghmaNano core under Wine, even headless
  simmode: segment0@jv           # use equilibrium@equilibrium for first stability smoke tests
  lockfile: 'S:\lock0.dat'
  fast_mode: true
  fast_vstep: 0.1                # quick JV smoke test; use 0.02 for production
  fast_ion_density: 0.0          # disable ion migration for quick smoke tests
  fast_generation_model: light_constant
  absorber_thickness_nm: null    # null = use sq_limit.thickness_nm
  formula: CsPbI3

# Composition-specific parameters (cell constants, bandgap references, PAW datasets).
# Override with --composition-config on the CLI.
composition_config: configs/compositions/CsPbI3.yaml
